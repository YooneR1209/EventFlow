spring:
  application:
    name: eventflow

  profiles:
    active: dev

  datasource:
    url: jdbc:mariadb://localhost:3306/eventflow_db
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

app:
  jwt:
    secret: ${}
    expiration-ms: 86400000

logging:
  level:
    com.tuNombre.eventflow: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG